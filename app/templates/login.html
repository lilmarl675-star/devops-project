<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - INPTIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .lock-icon { font-size: 56px; margin-bottom: 15px; }
        h2 { font-size: 1.8em; background: linear-gradient(135deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 0.85em; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.75em; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; background: rgba(0,0,0,0.3); color: #e2e8f0; font-size: 0.95em; transition: all 0.2s; }
        .form-group input:focus { border-color: #a855f7; outline: none; box-shadow: 0 0 0 3px rgba(168,85,247,0.2); }
        .form-group input::placeholder { color: #64748b; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #a855f7); color: white; border: none; border-radius: 40px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px rgba(59,130,246,0.4); }
        .flash { background: rgba(239,68,68,0.15); backdrop-filter: blur(10px); color: #f87171; padding: 12px; border-radius: 14px; margin-bottom: 20px; font-size: 0.85em; border: 1px solid rgba(239,68,68,0.3); }
        .footer-links { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85em; transition: color 0.2s; }
        .footer-links a:hover { color: #a855f7; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">🔐</div>
        <h2>Administration</h2>
        <div class="subtitle">Accès sécurisé</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="admin@inptic.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>
        <div class="footer-links">
            <a href="/">← Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
