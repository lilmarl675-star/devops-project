<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPTIC - Gestion des Étudiants</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }
        .content { max-width: 700px; width: 100%; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo-icon { font-size: 80px; margin-bottom: 15px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2)); }
        h1 { font-size: 4em; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { font-size: 0.8em; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .divider { width: 80px; height: 3px; background: linear-gradient(90deg, #3b82f6, #a855f7); border-radius: 10px; margin: 20px auto; }
        .badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 24px; border-radius: 100px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .badge-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .badge-text { color: #cbd5e1; font-size: 0.85em; }
        .welcome-message { font-size: 1.3em; font-weight: 500; color: #e2e8f0; line-height: 1.4; margin-bottom: 35px; }
        .welcome-message span { color: #a855f7; font-weight: 700; }
        .btn-login { display: inline-flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #3b82f6, #a855f7); color: white; text-decoration: none; padding: 14px 42px; font-size: 1em; font-weight: 600; border-radius: 60px; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -8px rgba(59,130,246,0.5); }
        .footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); color: #64748b; font-size: 0.7em; }
        .footer strong { color: #94a3b8; }
        @media (max-width: 600px) { h1 { font-size: 2.5em; } .logo-icon { font-size: 55px; } .welcome-message { font-size: 1em; } }
    </style>
</head>
<body>
    <div class="content">
        <div class="logo-icon">🎓</div>
        <h1>INPTIC</h1>
        <div class="subtitle">Institut National de la Poste, des Technologies<br>et de la Communication</div>
        <div class="divider"></div>
        <div class="badge"><span class="badge-dot"></span><span class="badge-text">Plateforme certifiée</span></div>
        <div class="welcome-message">Bienvenue dans <span>votre plateforme de gestion des étudiants</span>.</div>
        <a href="/login" class="btn-login">🔐 Connexion administration →</a>
        <div class="footer"><p>© 2024 <strong>INPTIC</strong> - Institut National de la Poste, des Technologies et de la Communication</p></div>
    </div>
</body>
</html>
